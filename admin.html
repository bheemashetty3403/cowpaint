<h1>Admin Panel</h1>

<h3>Add Product</h3>
<form method="post" action="/add_product">
<input name="name" placeholder="Name"><br>
<input name="price" placeholder="Price"><br>
<input name="stock" placeholder="Stock"><br>
<button>Add</button>
</form>

<h3>Make Sale</h3>
<form method="post" action="/sale">
<input name="product_id" placeholder="Product ID"><br>
<input name="qty" placeholder="Quantity"><br>
<button>Sell</button>
</form>
